<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App • Nik Ridley</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌥️ Weather Now</h1>
            <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </header>

        <div class="search-area">
            <input 
                type="text" 
                id="city-input" 
                placeholder="Enter city name (e.g. Denver)" 
                autocomplete="off">
            <button id="search-btn">Search</button>
        </div>

        <div id="loading" class="loading hidden">Loading weather...</div>
        <div id="error" class="error hidden"></div>

        <div id="weather-info" class="weather-info hidden">
            <div class="location">
                <h2 id="city-name"></h2>
                <p id="date"></p>
            </div>

            <div class="main-weather">
                <img id="weather-icon" src="" alt="Weather icon">
                <div class="temperature">
                    <span id="temp"></span>
                    <button id="unit-toggle">°C</button>
                </div>
                <p id="description" class="description"></p>
            </div>

            <div class="details">
                <div class="detail-item">
                    <span>Feels like</span>
                    <span id="feels-like"></span>
                </div>
                <div class="detail-item">
                    <span>Humidity</span>
                    <span id="humidity"></span>
                </div>
                <div class="detail-item">
                    <span>Wind</span>
                    <span id="wind"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
